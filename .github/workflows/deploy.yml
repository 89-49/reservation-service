name: Deploy to GCP VM

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Java 설정 (프로젝트에 맞는 버전으로 설정)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # 2. Gradle 빌드 (jar 파일 생성)
      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      # 3. GCP 인증
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 4. 빌드된 jar 파일만 서버로 전송
      - name: 'Copy Jar to VM'
        run: |
          gcloud compute scp build/libs/*.jar reservation-service:~/app/app.jar --zone=asia-northeast3-a --quiet

      # 5. 서버에서 앱 실행
      - name: 'SSH and Start App'
        run: |
          gcloud compute ssh reservation-service --zone=asia-northeast3-a --quiet --command="
            pgrep java | xargs -r kill -9
            nohup java -jar ~/app/app.jar > ~/app/log.txt 2>&1 &
          "