name: Deploy Reservation Service

on:
  push:
    branches: [ "main","dev" ]
  workflow_dispatch:

env:
  GCP_PROJECT: ${{ vars.GCP_PROJECT_ID }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  AR_IMAGE_PATH: ${{ vars.AR_IMAGE_PATH }}
  VM_NAME: reservation-service
  VM_USER: zsx1397
  WORK_DIR: /home/zsx1397/app
  HEALTH_RETRIES: 30
  HEALTH_INTERVAL: 10

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      registry_host: ${{ steps.meta.outputs.registry_host }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve image metadata
        id: meta
        run: |
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "registry_host=$(echo "$AR_IMAGE_PATH" | cut -d/ -f1)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.registry_host }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.AR_IMAGE_PATH }}:${{ steps.meta.outputs.tag }}
            ${{ env.AR_IMAGE_PATH }}:latest
          secrets: |
            GPR_USER=${{ secrets.GPR_USER }}
            GPR_TOKEN=${{ secrets.GPR_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/google_compute_engine
          chmod 600 ~/.ssh/google_compute_engine
          ssh-keygen -y -f ~/.ssh/google_compute_engine > ~/.ssh/google_compute_engine.pub
          ssh-keyscan -H 34.64.247.238 >> ~/.ssh/known_hosts

      - name: Check VM status
        id: vm-status
        run: |
          STATUS=$(gcloud compute instances describe "$VM_NAME" \
            --zone="$GCP_ZONE" \
            --project="$GCP_PROJECT" \
            --format="value(status)" 2>/dev/null || echo "NOT_FOUND")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "$VM_NAME -> $STATUS"

      - name: Copy compose file
        if: steps.vm-status.outputs.status == 'RUNNING'
        run: |
          gcloud compute scp deploy/docker-compose.prod.yaml \
            "$VM_USER@$VM_NAME:/tmp/docker-compose.prod.yaml" \
            --zone="$GCP_ZONE" \
            --project="$GCP_PROJECT" \
            --tunnel-through-iap \
            --ssh-key-file=~/.ssh/google_compute_engine \
            --scp-flag=-O \
            --quiet

      - name: Deploy and verify
        if: steps.vm-status.outputs.status == 'RUNNING'
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          AR_TOKEN: ${{ steps.auth.outputs.access_token }}
          REGISTRY_HOST: ${{ needs.build-and-push.outputs.registry_host }}
        run: |
          gcloud compute ssh "$VM_USER@$VM_NAME" \
            --zone="$GCP_ZONE" \
            --project="$GCP_PROJECT" \
            --tunnel-through-iap \
            --ssh-key-file=~/.ssh/google_compute_engine \
            --quiet \
            --command="
              set -e

              echo '$AR_TOKEN' | docker login -u oauth2accesstoken --password-stdin https://$REGISTRY_HOST

              mkdir -p '$WORK_DIR'
              mv /tmp/docker-compose.prod.yaml '$WORK_DIR/docker-compose.prod.yaml'
              cd '$WORK_DIR'

              test -f .env || { echo '.env not found in $WORK_DIR'; exit 1; }

              if ! grep -Eq '^SERVER_IP=[^[:space:]]+' .env; then
                echo 'SERVER_IP is required in .env for deployment.'
                exit 1
              fi

              if ! grep -Eq '^SERVER_PORT=[0-9]+' .env; then
                echo 'SERVER_PORT is required in .env for deployment.'
                exit 1
              fi

              if ! docker network inspect pgsg-network >/dev/null 2>&1; then
                docker network create pgsg-network
              fi

              docker image prune -af || true
              docker container prune -f || true

              IMAGE_TAG='$IMAGE_TAG' AR_IMAGE_PATH='$AR_IMAGE_PATH' docker compose -f docker-compose.prod.yaml config >/dev/null
              IMAGE_TAG='$IMAGE_TAG' AR_IMAGE_PATH='$AR_IMAGE_PATH' docker compose -f docker-compose.prod.yaml pull
              IMAGE_TAG='$IMAGE_TAG' AR_IMAGE_PATH='$AR_IMAGE_PATH' docker compose -f docker-compose.prod.yaml up -d

              for i in \$(seq 1 $HEALTH_RETRIES); do
                if curl -sf http://localhost:8085/actuator/health | grep -q '\"status\":\"UP\"'; then
                  echo \"Actuator UP (attempt \$i)\"
                  docker ps
                  docker logs reservation-service --tail=120
                  exit 0
                fi
                echo \"Waiting for service... (\$i/$HEALTH_RETRIES)\"
                sleep $HEALTH_INTERVAL
              done

              docker ps
              docker logs reservation-service --tail=200
              echo 'Actuator health check failed.'
              exit 1
            "
