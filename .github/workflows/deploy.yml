name: Deploy to GCP VM

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 설정 및 빌드
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar \
          -Pgpr.user=${{ github.actor }} \
          -Pgpr.key=${{ secrets.GITHUB_TOKEN }}

      # 직접 SSH 접속을 위한 키 설정
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # 서버 IP를 알려진 호스트에 등록 (IP: 34.64.247.238 확인 필요)
          ssh-keyscan -H 34.64.247.238 >> ~/.ssh/known_hosts

      # 빌드된 jar 파일 전송 (표준 SCP 사용)
      - name: 'Copy Jar to VM'
        run: |
          # zsx1397 계정으로 직접 전송
          scp -i ~/.ssh/id_rsa build/libs/*.jar zsx1397@34.64.247.238:~/app.jar

      # 서버에서 앱 실행 (표준 SSH 사용)
      - name: 'SSH and Start App'
        run: |
          ssh -i ~/.ssh/id_rsa zsx1397@34.64.247.238 "
            mkdir -p ~/app
            mv ~/app.jar ~/app/app.jar 2>/dev/null || true
          
            # 기존 프로세스 종료
            pgrep java | xargs -r kill -9 || true
          
            # 새 앱 실행
            nohup java -jar ~/app/app.jar > ~/app/log.txt 2>&1 &
          
            sleep 5
            ps -ef | grep java | grep -v grep
          "