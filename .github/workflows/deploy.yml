name: Deploy to GCP VM

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 설정
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # Gradle 빌드
      - name: Build with Gradle
        env:
          GPR_USER: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      # GCP 인증
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 빌드된 jar 파일 전송 (IAP 터널 사용)
      - name: 'Copy Jar to VM'
        run: |
          sleep 15
          gcloud compute scp build/libs/*.jar reservation-service:~/app.jar \
            --zone=asia-northeast3-a \
            --tunnel-through-iap \
            --quiet

      # 서버에서 앱 실행 (명령어 최적화)
      - name: 'SSH and Start App'
        run: |
          gcloud compute ssh reservation-service \
            --zone=asia-northeast3-a \
            --tunnel-through-iap \
            --quiet \
            --command="
              mkdir -p ~/app
              # 전송된 파일을 app 폴더로 이동 (이미 있다면 덮어쓰기)
              mv ~/app.jar ~/app/app.jar 2>/dev/null || true
          
              # 기존 실행 중인 프로세스 종료
              pgrep java | xargs -r kill -9 || true
          
              # 새 jar 파일 실행
              nohup java -jar ~/app/app.jar > ~/app/log.txt 2>&1 &
          
              # 실행 확인을 위해 5초 대기 후 프로세스 목록 출력
              sleep 5
              ps -ef | grep java | grep -v grep
          "