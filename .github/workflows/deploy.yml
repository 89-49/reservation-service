name: Deploy to GCP VM

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 설정 및 빌드
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar \
          -Pgpr.user=${{ github.actor }} \
          -Pgpr.key=${{ secrets.GITHUB_TOKEN }}

      # GCP 인증
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 빌드된 jar 파일 전송 (계정 명시 + IAP 터널)
      - name: 'Copy Jar to VM'
        run: |
          sleep 15
          gcloud compute scp build/libs/*.jar zsx1397@reservation-service:~/app.jar \
            --zone=asia-northeast3-a \
            --tunnel-through-iap \
            --quiet

      # 서버에서 앱 실행
      - name: 'SSH and Start App'
        run: |
          gcloud compute ssh zsx1397@reservation-service \
            --zone=asia-northeast3-a \
            --tunnel-through-iap \
            --quiet \
            --command="
              mkdir -p ~/app
              mv ~/app.jar ~/app/app.jar 2>/dev/null || true
              pgrep java | xargs -r kill -9 || true
              nohup java -jar ~/app/app.jar > ~/app/log.txt 2>&1 &
              sleep 5
              ps -ef | grep java | grep -v grep
          "