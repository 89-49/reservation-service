name: Deploy to GCP VM

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java 설정 (프로젝트에 맞는 버전으로 설정)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # Gradle 빌드 (jar 파일 생성)
      - name: Build with Gradle
        run: |
            chmod +x ./gradlew
            ./gradlew clean bootJar
          env:
            # GitHub Packages 인증을 위해 토큰을 넘겨줍니다.
            USERNAME: ${{ github.actor }}
            TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GCP 인증
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # 빌드된 jar 파일만 서버로 전송
      - name: 'Copy Jar to VM'
        run: |
          gcloud compute scp build/libs/*.jar reservation-service:~/app/app.jar --zone=asia-northeast3-a --quiet

      # 서버에서 앱 실행
      - name: 'SSH and Start App'
        run: |
            gcloud compute ssh reservation-service --zone=asia-northeast3-a --quiet --command="
              mkdir -p ~/app
              # 기존에 실행 중인 Java 프로세스 종료 (있으면 죽이고 없으면 통과)
              pgrep java | xargs -r kill -9
            
              # 새 jar 파일 실행 (로그는 log.txt에 저장)
              nohup java -jar ~/app/app.jar > ~/app/log.txt 2>&1 &
            
              # 실행 확인 (3초 뒤에 프로세스 떠있는지 확인)
              sleep 3
              ps -ef | grep java
            "