name: Deploy to GCP VM

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GCP 인증
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # SSH 키 설정
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/google_compute_engine
          chmod 600 ~/.ssh/google_compute_engine
          ssh-keygen -y -f ~/.ssh/google_compute_engine > ~/.ssh/google_compute_engine.pub
          ssh-keyscan -H 34.64.247.238 >> ~/.ssh/known_hosts

      # 프로젝트 핵심 파일만 VM으로 전송
      - name: 'Sync Project to VM'
        run: |
          mkdir -p deploy
          cp -r src deploy/
          cp build.gradle settings.gradle Dockerfile docker-compose.yml deploy/

          gcloud compute scp --recurse ./deploy/* zsx1397@reservation-service:~/app \
            --zone=asia-northeast3-a \
            --tunnel-through-iap \
            --ssh-key-file=~/.ssh/google_compute_engine \
            --quiet

      # VM에서 Docker Compose 실행
      - name: 'Docker Compose Up'
        run: |
          gcloud compute ssh zsx1397@reservation-service \
            --zone=asia-northeast3-a \
            --tunnel-through-iap \
            --ssh-key-file=~/.ssh/google_compute_engine \
            --quiet \
            --command="
              cd ~/app
          
              docker-compose down --remove-orphans
          
              if [ ! -f .env ]; then
                echo '.env 파일이 없습니다!'
                exit 1
              fi
          
              # --env-file 옵션을 사용하여 직접 전달
              # GPR_USER와 GPR_TOKEN은 Dockerfile에서 ARG로 사용되므로 빌드 시점에 주입
              docker-compose up -d --build --force-recreate
          
              sleep 10
              docker ps
              docker logs reservation-service || echo '실행 실패 - 빌드 로그를 확인하세요'
          "