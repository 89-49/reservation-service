name: Deploy to GCP VM

on:
  push:
    branches: [ "dev" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        env:
          GPR_USER: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar

      # 직접 SSH 접속을 위한 키 설정
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # 서버의 지문을 미리 인식시킴 (34.64.247.238 부분은 민성님의 서버 IP가 맞는지 확인!)
          ssh-keyscan -H 34.64.247.238 >> ~/.ssh/known_hosts

      # SCP로 파일 전송 (zsx1397 계정 사용)
      - name: 'Copy Jar to VM'
        run: |
          scp -i ~/.ssh/id_rsa build/libs/*.jar zsx1397@34.64.247.238:~/app.jar

      # SSH로 명령 실행
      - name: 'SSH and Start App'
        run: |
          ssh -i ~/.ssh/id_rsa zsx1397@34.64.247.238 "
            mkdir -p ~/app
            mv ~/app.jar ~/app/app.jar
            pgrep java | xargs -r kill -9
            nohup java -jar ~/app/app.jar > ~/app/log.txt 2>&1 &
            sleep 5
            ps -ef | grep java
          "